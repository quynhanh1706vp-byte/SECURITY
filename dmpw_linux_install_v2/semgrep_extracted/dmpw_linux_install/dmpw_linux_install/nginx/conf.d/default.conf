server {
  listen 5000;
  root /var/www/html;
  client_max_body_size 1000M;
  index index.html index.htm index.nginx-debian.html;

  # ssl_certificate /etc/nginx/tls-gen/server_certificate.pem;
  # ssl_certificate_key /etc/nginx/tls-gen/server_key.pem;
  ssl_dhparam /etc/nginx/conf.d/ssl-dhparams.pem;

  location /swagger/index.html {
      auth_basic              "Restricted";
      auth_basic_user_file    /etc/nginx/conf.d/.htpasswd;
      resolver 127.0.0.11 valid=30s;
      proxy_pass  http://dmpw-api:5000/swagger/index.html;
      proxy_set_header    Host                $http_host;
      proxy_set_header    X-Real-IP           $remote_addr;
      proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass  http://dmpw-api:5000;
    proxy_set_header    Host                $http_host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
  }

   location /ws {
    proxy_pass http://dmpw-api:5000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
  }
}

