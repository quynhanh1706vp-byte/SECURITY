version: '3.8'

x-default: &default
  networks:
    - dmpw-net
  restart: always

services:
  postgres-db:
    << : *default
    container_name: "postgres-db"
    image: "009795078640.dkr.ecr.ap-southeast-1.amazonaws.com/dmpw/postgres:${POSTGRES_VERSION}"
    volumes:
      - ./postgres-db:/var/lib/postgresql/data
    command: postgres -c 'max_connections=1000'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ahdugewyfwyagdydahsu
      - POSTGRES_DB=demasterpro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - dmpw-net

  dmpw-api:
    << : *default
      #image: "009795078640.dkr.ecr.ap-southeast-1.amazonaws.com/dmpw/dmpw-api:${DMPW_API_VERSION}"
    image: "dmpw-api:${DMPW_API_VERSION}"
    container_name: "dmpw-api"
    hostname: "dmpw-api"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./settings/settings.dmpw-api.json:/tmp/appsettings.Production.json
      - ./settings/DeMasterProKey.pem:/app/DeMasterProKey.pem
      - ./backup-data/event-logs:/app/backup_eventlogs
      - ./backup-data/system-logs:/app/backup_systemlogs
      - ./backup-data/images:/app/images
      - ./backup-data/videos:/app/videos
      - ./backup-data/vehicleImages:/app/vehicleImages
      - ./backup-data/firmwares:/app/firmwares
      - ./tls-gen:/tmp/tls-gen
    entrypoint: /bin/bash -c './update_version.sh && cp /tmp/appsettings.Production.json /app/appsettings.Production.json && dotnet DeMasterProCloud.Api.dll'
    restart: always
    depends_on:
      - postgres-db
      - device-sdk
    networks:
      - dmpw-net

  webapp:
    << : *default
    image: "009795078640.dkr.ecr.ap-southeast-1.amazonaws.com/dmpw/webapp:${WEBAPP_VERSION}"
    container_name: "dmpw-webapp"
    environment:
      - env=Production
    volumes:
      - ./settings/env.production.js:/tmp/env.production.js
    command: /bin/bash -c "cp /tmp/env.production.js /usr/share/nginx/html/.env.production.js && /usr/share/nginx/html/env.sh && nginx -g \"daemon off;\""
    restart: always
    networks:
      - dmpw-net

  logger:
    << : *default
    image: "009795078640.dkr.ecr.ap-southeast-1.amazonaws.com/docker-logger:${LOGGER_VERSION}"
    container_name: "logger"
    hostname: "logger"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      - LOG_FILES=true
      - LOG_SYSLOG=false
      - EXCLUDE=docker-logger
      - MAX_FILES=10
      - MAX_SIZE=50
      - MAX_AGE=30
      - DEBUG=false
    volumes:
      - ./logs:/srv/logs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - dmpw-net

  backup:
    << : *default
    image: "009795078640.dkr.ecr.ap-southeast-1.amazonaws.com/docker-backup:${BACKUP_VERSION}"
    container_name: "dmpw-backup"
    env_file:
      - ./docker-backup.env
    volumes:
      - ./backup/postgres-dmpw:/var/backup
      - ./backup/backup-dmpw:/var/backup-result
      - ./backup/restore-dmpw:/var/restore-result
    restart: always
    networks:
      - dmpw-net

  grafana:
    <<: *default
    image: "grafana/grafana:${GRAFANA_VERSION}"
    container_name: "grafana"
    volumes:
      - ./grafana-storage:/var/lib/grafana:rw
    user: "472"
    ports:
      - "3000:3000"
    restart: always
    networks:
      - dmpw-net

  prometheus:
    <<: *default
    image: "prom/prometheus:${PROMETHEUS_VERSION}"
    container_name: "prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - dmpw-net

  cadvisor:
    <<: *default
    image: "gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}"
    container_name: "cadvisor"
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always
    networks:
      - dmpw-net

  node-exporter:
    <<: *default
    image: "prom/node-exporter:${NODE_EXPORTER_VERSION}"
    container_name: "node-exporter"
    ports:
      - "9100:9100"
    restart: always
    networks:
      - dmpw-net

  army-webapp:
    <<: *default
    container_name: "army-webapp"
    image: "vn-army-dmp-webapp:${WEBAPP_ARMY_VERSION}"
    environment:
      - NEXT_PUBLIC_API_ENDPOINT=${NEXT_PUBLIC_API_ENDPOINT}
      - NEXT_PUBLIC_WS_ENDPOINT=${NEXT_PUBLIC_WS_ENDPOINT}
    restart: always
    networks:
      - dmpw-net

  device-sdk:
    << : *default
    image: "device_sdk:${DMPW_DEVICE_SDK_VERSION}"
    container_name: "dmpw-device-sdk"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./settings/settings.dmpw-device-sdk.json:/tmp/appsettings.json
      - ./settings/settings.dmpw-device-sdk.Production.json:/tmp/appsettings.Production.json
      - ./tls-gen:/app/certificate
      - ./fileUrls:/app/fileUrls
      - ./tls-gen/client_key.p12:/app/client_key.p12
    entrypoint: /bin/bash -c 'cp /tmp/appsettings.json /app/appsettings.json && cp /tmp/appsettings.Production.json /app/appsettings.Production.json && dotnet DMPDeviceSDK.dll'
    ports:
      - "1883:1883"
      - "8883:8883"
    restart: always
    networks:
      - dmpw-net

#  dmpw-grpc:
#    << : *default
#    image: "dmpw-grpc:${DMPW_DEVICE_GRPC_VERSION}"
#    container_name: "dmpw-grpc"
#    environment:
#      - ASPNETCORE_ENVIRONMENT=Production
#    volumes:
#      - ./settings/settings.dmpw-device-grpc.Production.json:/tmp/appsettings.Production.json
#      - ./settings/device_info.json:/app/device_info.json
#      - ./settings/database.db:/app/database.db
#      - ./settings/biostar:/app/biostar
#      - ./settings/device_gateway:/app/device_gateway
#    entrypoint: /bin/bash -c 'cp /tmp/appsettings.Production.json /app/appsettings.Production.json && dotnet GRPCSystem.Api.dll'
#    restart: always
#    networks:
#      - dmpw-net

  nginx:
    << : *default
    image: "nginx:${NGINX_VERSION}"
    container_name: "nginx"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./tls-gen:/etc/nginx/tls-gen
    expose:
      - "80"
      - "90"
      - "5000"
      - "5001"
      - "5002"
    ports: 
      - "80:80"
      - "90:90"
      - "5000:5000"
      - "5001:5001"
      - "5002:5002"
    command: nginx -g "daemon off;"
    restart: always
    networks:
      - dmpw-net

networks: 
  dmpw-net:
    driver: bridge
