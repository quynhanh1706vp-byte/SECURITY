rules:
# ---- C# XXE (heuristic) ----
- id: csharp-xml-xxe-insecure
  message: 'XXE/unsafe XML: dùng XmlDocument/XmlReader – set DtdProcessing=Prohibit, XmlResolver=null.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: '(new\s+XmlDocument\s*\(\))|(XmlReader\.Create\s*\()'

# ---- C# Regex DoS ----
- id: csharp-regex-without-timeout
  message: 'Regex không đặt timeout — dùng overload có TimeSpan timeout.'
  severity: WARNING
  languages: [csharp]
  pattern-regex: 'new\s+Regex\s*\((?![^)]*TimeSpan)[^)]*\)'

# ---- C# thiếu UseHttpsRedirection ----
- id: csharp-missing-https-redirect
  message: 'Thiếu app.UseHttpsRedirection().'
  severity: WARNING
  languages: [csharp]
  pattern-regex: '(?s)app\.UseRouting\(\);\s*(?!.*UseHttpsRedirection\(\))'

# ---- K8s hardening (dùng lookahead, KHÔNG dùng lookbehind) ----
# Có kind là Workload nhưng KHÔNG thấy runAsNonRoot:true
- id: k8s-missing-runasnonroot
  message: 'K8s: thiếu securityContext.runAsNonRoot: true.'
  severity: ERROR
  languages: [yaml]
  pattern-regex: '(?s)\A(?=.*\bkind:\s*(Deployment|Pod|StatefulSet|DaemonSet)\b)(?!.*\brunAsNonRoot:\s*true\b).*'

# Có kind là Workload nhưng KHÔNG thấy readOnlyRootFilesystem:true
- id: k8s-missing-readonlyrootfs
  message: 'K8s: thiếu securityContext.readOnlyRootFilesystem: true.'
  severity: ERROR
  languages: [yaml]
  pattern-regex: '(?s)\A(?=.*\bkind:\s*(Deployment|Pod|StatefulSet|DaemonSet)\b)(?!.*\breadOnlyRootFilesystem:\s*true\b).*'

# Có kind là Workload nhưng KHÔNG thấy capabilities.drop
- id: k8s-missing-cap-drop
  message: 'K8s: thiếu capabilities.drop.'
  severity: ERROR
  languages: [yaml]
  pattern-regex: '(?s)\A(?=.*\bkind:\s*(Deployment|Pod|StatefulSet|DaemonSet)\b)(?!.*\bcapabilities:\s*\n\s*drop:\b).*'

# Có kind là Workload nhưng KHÔNG thấy seccompProfile.type: RuntimeDefault
- id: k8s-missing-seccomp-runtime-default
  message: 'K8s: thiếu seccompProfile.type: RuntimeDefault.'
  severity: WARNING
  languages: [yaml]
  pattern-regex: '(?s)\A(?=.*\bkind:\s*(Deployment|Pod|StatefulSet|DaemonSet)\b)(?!.*\bseccompProfile:\s*\n\s*type:\s*RuntimeDefault\b).*'

# Có kind là Workload nhưng KHÔNG thấy AppArmor annotation
- id: k8s-missing-apparmor
  message: 'K8s: thiếu AppArmor annotation.'
  severity: WARNING
  languages: [yaml]
  pattern-regex: '(?s)\A(?=.*\bkind:\s*(Deployment|Pod|StatefulSet|DaemonSet)\b)(?!.*\bcontainer\.apparmor\.security\.beta\.kubernetes\.io\b).*'
