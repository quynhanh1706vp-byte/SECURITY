rules:
- id: generic.path.traversal.join
  languages: [csharp, javascript, typescript]
  severity: HIGH
  message: "Khả nghi Path Traversal khi ghép đường dẫn từ input."
  pattern-either:
    - pattern: Path.Combine($X, $USER)
    - pattern: $X + $USER
  metadata:
    owasp: ["A01: Broken Access Control", "A05: Security Misconfiguration"]
    fix: "Canonicalize (realpath), allowlist thư mục/đuôi file, chặn '..'."
