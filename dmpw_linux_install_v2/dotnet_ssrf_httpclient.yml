rules:
- id: csharp.dotnet.security.ssrf.httpclient
  languages: [csharp]
  severity: HIGH
  message: "Khả nghi SSRF: HttpClient gọi URL từ input chưa kiểm soát."
  patterns:
    - pattern: |
        new HttpClient().$M($URL, ...)
    - metavariable-pattern:
        metavariable: $URL
        pattern: $X
  metadata:
    owasp: ["A10: SSRF"]
    fix: "Allowlist host/scheme; chặn private IP; parse/validate URL từ input trước khi gọi."
