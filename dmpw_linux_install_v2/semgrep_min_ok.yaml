# Minimal, known-good config — 2 rules only
rules:

- id: generic-secrets-high
  message: Hardcoded secret detected
  severity: CRITICAL
  languages: [generic]
  patterns:
    - pattern-regex: (?i)(api[_-]?key|apikey|token|password)\s*[:=]\s*["'][A-Za-z0-9/\+_=:\-]{12,}["']

- id: csharp-missing-authorize-on-post
  message: Missing [Authorize] on POST action
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern: |
        public class $CTRL : $BASE {
          ...
          [HttpPost(...)]
          public $T $M(...){ ... }
        }
    - pattern-not-inside: |
        [Authorize(...)]
        public class $CTRL : $BASE { ... }
