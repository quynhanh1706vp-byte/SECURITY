# Semgrep Custom Full (syntax-safe)
rules:

# 1) C# — Missing [Authorize] on modifying actions
- id: csharp-missing-authorize-on-modifying-actions
  message: >
    State-changing action (POST/PUT/PATCH/DELETE) is missing [Authorize] (or equivalent).
    Enforce deny-by-default and require explicit authorization on write operations.
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: |
            public class $CTRL : $BASE {
              ...
              [HttpPost(...)]
              public $T $M(...){ ... }
            }
        - pattern: |
            public class $CTRL : $BASE {
              ...
              [HttpPut(...)]
              public $T $M(...){ ... }
            }
        - pattern: |
            public class $CTRL : $BASE {
              ...
              [HttpPatch(...)]
              public $T $M(...){ ... }
            }
        - pattern: |
            public class $CTRL : $BASE {
              ...
              [HttpDelete(...)]
              public $T $M(...){ ... }
            }
    - pattern-not-inside: |
        [Authorize(...)]
        public class $CTRL : $BASE { ... }
    - pattern-not: |
        [Authorize(...)]
        public $T $M(...){ ... }
  metadata: { category: broken-access-control, impact: high }

# 2) C# — Path traversal when reaches I/O sinks
- id: csharp-path-traversal-io-sinks
  message: >
    Possible path traversal into file I/O sink. Normalize with Path.GetFullPath and enforce baseDir prefix
    or use Path.GetFileName for filenames.
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: File.$F(...)
        - pattern: Directory.$F(...)
        - pattern: new FileStream(...)
    - metavariable-pattern:
        metavariable: $F
        pattern: (Open|OpenRead|OpenWrite|ReadAll.*|WriteAll.*|Create|Delete|Move|Copy|Exists)
    - pattern-not: |
        Path.Combine(...)
  metadata: { category: path-traversal, impact: high }

# 3) Generic — Secrets (high-signal regex)
- id: generic-secrets-high
  message: 'Hardcoded secret (API key / token / private key / password). Remove & rotate.'
  severity: CRITICAL
  languages: [generic]
  patterns:
    - pattern-regex: (?i)(aws_.{0,20}secret|access[_-]?key|api[_-]?key|apikey|token|private[_-]?key|jwt[_-]?secret|password)\s*[:=]\s*["'][A-Za-z0-9/\+_=:\-]{12,}["']
  metadata: { category: secrets, impact: critical }

# 4) C# — Logging sensitive values
- id: csharp-logging-sensitive-data
  message: 'Avoid logging sensitive values (passwords, tokens, secrets).'
  severity: MEDIUM
  languages: [csharp]
  patterns:
    - pattern-regex: (?i)Log(Information|Debug|Warning|Error)\(.*(password|secret|token).*
  metadata: { category: sensitive-logging, impact: medium }

# 5) JS/TS — DOM XSS sinks
- id: js-domxss-dangerous-innerhtml
  message: 'Dangerous HTML sink (innerHTML/outerHTML/document.write).'
  severity: ERROR
  languages: [javascript, typescript]
  patterns:
    - pattern-either:
        - pattern: $EL.innerHTML = $X
        - pattern: $EL.outerHTML = $X
        - pattern: document.write($X)
  metadata: { category: xss, impact: high }

# 6) C# — SQL Injection (concat/interpolation)
- id: csharp-sql-injection-concat
  message: 'Possible SQL injection via string concatenation/interpolation. Use parameters.'
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: $DB.Execute(... + $U + ...)
        - pattern: $DB.Query(... + $U + ...)
        - pattern: $DB.Execute($"..." + $U + "...")
        - pattern: $DB.Query($"..." + $U + "...")
        - pattern: $CTX.Database.ExecuteSqlRaw(... + $U + ...)
        - pattern: $CTX.Database.ExecuteSqlInterpolated($"..." + $U + "...")
  metadata: { category: injection, impact: high }

# 7) C# — SSRF (outbound HTTP sinks)
- id: csharp-ssrf-user-controlled-url
  message: 'SSRF risk: outbound HTTP with user-controlled URL. Enforce allowlist and block link-local/metadata.'
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: $HC.SendAsync($REQ)
        - pattern: HttpClient.$M($URL)
        - pattern: WebRequest.Create($URL)
  metadata: { category: ssrf, impact: high }

# 8) C#/JS/TS — Insecure WebSocket (ws://)
- id: insecure-websocket-ws
  message: 'Insecure WebSocket (ws://). Use wss:// and TLS.'
  severity: ERROR
  languages: [csharp, javascript, typescript]
  patterns:
    - pattern-regex: (?i)ws://
  metadata: { category: transport, impact: high }

# 9) C# — JWT parsed without validation
- id: csharp-jwt-without-validate
  message: 'JWT is parsed without validation. Ensure ValidateToken is used.'
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern: |
        var token = new JwtSecurityTokenHandler().ReadToken($S);
    - pattern-not: |
        new JwtSecurityTokenHandler().ValidateToken(...)
  metadata: { category: authn, impact: high }

# 10) C# — CSRF: missing ValidateAntiForgeryToken on write
- id: csharp-missing-antiforgery-token
  message: 'State-changing controller action missing anti-forgery validation.'
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: |
            public class $C : $BASE {
              ...
              [HttpPost(...)]
              public $T $M(...){ ... }
            }
        - pattern: |
            public class $C : $BASE {
              ...
              [HttpPut(...)]
              public $T $M(...){ ... }
            }
        - pattern: |
            public class $C : $BASE {
              ...
              [HttpDelete(...)]
              public $T $M(...){ ... }
            }
    - pattern-not: |
        [ValidateAntiForgeryToken]
        public $T $M(...){ ... }
  metadata: { category: csrf, impact: high }

# 11) Dockerfile — non-root / capabilities
- id: docker-nonroot-and-capabilities
  message: 'Harden Dockerfile: run as non-root, drop capabilities, set readOnlyRootFilesystem when possible.'
  severity: ERROR
  languages: [dockerfile]
  patterns:
    - pattern-either:
        - pattern: |
            FROM $BASE
            ...
            USER root
        - pattern-not: |
            USER $NONROOT
  metadata: { category: container, impact: high }

# 12) K8s — hardening basics (securityContext)
- id: k8s-hardening-basics
  message: 'K8s hardening: drop capabilities, readOnlyRootFilesystem, runAsNonRoot, seccompProfile.'
  severity: ERROR
  languages: [yaml]
  patterns:
    - pattern: |
        apiVersion: $V
        kind: Pod
        metadata: ...
        spec:
          containers:
            - name: $N
              securityContext: $SC
    - pattern-not: |
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
  metadata: { category: iac, impact: high }
