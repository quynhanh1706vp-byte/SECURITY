# Semgrep Custom Full v3 (no pattern-either) — compatible with older engine
rules:

# ===== Broken Access Control: Missing [Authorize] =====
- id: csharp-missing-authorize-on-post
  message: 'POST action missing [Authorize].'
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern: |
        public class $CTRL : $BASE {
          ...
          [HttpPost(...)]
          public $T $M(...){ ... }
        }
    - pattern-not-inside: |
        [Authorize(...)]
        public class $CTRL : $BASE { ... }
    - pattern-not: |
        [Authorize(...)]
        public $T $M(...){ ... }
  metadata: { category: broken-access-control, impact: high }

