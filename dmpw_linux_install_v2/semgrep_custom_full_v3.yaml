# ===== Docker hardening =====
- id: docker-user-nonroot
  message: 'Dockerfile runs as root. Use USER nonroot.'
  severity: ERROR
  languages: [dockerfile]
  patterns:
    - pattern: |
        FROM $B
        ...
        USER root
  metadata: { category: container, impact: high }

# ===== K8s hardening (basic securityContext) =====
- id: k8s-hardening-basics
  message: 'K8s hardening: runAsNonRoot, allowPrivilegeEscalation: false, readOnlyRootFilesystem: true.'
  severity: ERROR
  languages: [yaml]
  patterns:
    - pattern: |
        apiVersion: $V
        kind: Pod
        metadata: ...
        spec:
          containers:
            - name: $N
              securityContext: $SC
    - pattern-not: |
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
  metadata: { category: iac, impact: high }
