rules:
- id: csharp-rce-process-start
  message: 'Khả năng RCE: Process.Start/StartInfo với input có thể từ user.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: '(System\.)?Diagnostics\.Process\.Start\s*\('

- id: csharp-cookie-flags-missing
  message: 'CookieOptions có thể thiếu Secure/HttpOnly/SameSite.'
  severity: WARNING
  languages: [csharp]
  pattern-regex: 'new\s+CookieOptions\s*\{[^\}]*\}'

- id: csharp-jwt-missing-issuer-validation
  message: 'TokenValidationParameters: ValidateIssuer = false.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: 'TokenValidationParameters\s*\{[^}]*ValidateIssuer\s*=\s*false'

- id: csharp-jwt-missing-audience-validation
  message: 'TokenValidationParameters: ValidateAudience = false.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: 'TokenValidationParameters\s*\{[^}]*ValidateAudience\s*=\s*false'

- id: csharp-jwt-missing-lifetime-validation
  message: 'TokenValidationParameters: ValidateLifetime = false.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: 'TokenValidationParameters\s*\{[^}]*ValidateLifetime\s*=\s*false'

- id: csharp-jwt-missing-exp
  message: 'TokenValidationParameters: RequireExpirationTime = false.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: 'TokenValidationParameters\s*\{[^}]*RequireExpirationTime\s*=\s*false'

- id: csharp-host-header-trust
  message: 'Có thể dùng Request.Host/X-Forwarded-* để build URL mà không validate.'
  severity: WARNING
  languages: [csharp]
  pattern-regex: '(Request\.Host|X-Forwarded-Host|X-Forwarded-Proto)'

- id: fe-localstorage-token
  message: 'Không nên lưu token/bearer vào localStorage (dễ XSS).'
  severity: WARNING
  languages: [javascript, typescript]
  pattern-regex: |
    localStorage\.setItem\s*\(\s*(['"])(token|auth|access|bearer)\1

- id: csharp-dapper-ado-concat
  message: 'SQLi risk (Dapper/ADO): Query/Execute/SqlCommand concat/interpolated.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: '((Query|Execute)\s*\(\s*(\$"|".*\+))|(new\s+SqlCommand\s*\(\s*(\$"|".*\+))'

- id: csharp-ef-rawsql-concat-plus
  message: 'EF Raw SQL: FromSqlRaw/ExecuteSqlRaw concat/interpolated không tham số hoá.'
  severity: ERROR
  languages: [csharp]
  pattern-regex: '(FromSqlRaw|ExecuteSqlRaw)\s*\(\s*(\$"|".*\+)'

- id: k8s-rbac-wildcard
  message: 'RBAC quá rộng: resources:["*"] hoặc verbs:["*"].'
  severity: ERROR
  languages: [yaml]
  patterns:
    - pattern-regex: 'apiVersion:\s*rbac\.authorization\.k8s\.io/.*\nrules:'
    - pattern-regex: '(resources:\s*\[\s*"\*"\s*\]|verbs:\s*\[\s*"\*"\s*\])'

- id: k8s-service-public
  message: 'Service type public (NodePort/LoadBalancer).'
  severity: WARNING
  languages: [yaml]
  patterns:
    - pattern-regex: 'kind:\s*Service'
    - pattern-regex: 'type:\s*(NodePort|LoadBalancer)'

- id: k8s-ingress-no-tls
  message: 'Ingress thiếu TLS.'
  severity: ERROR
  languages: [yaml]
  pattern-regex: '(?s)kind:\s*Ingress(?!.*\btls:\b)'

- id: docker-latest-tag
  message: 'Docker FROM dùng :latest. Hãy pin phiên bản cụ thể.'
  severity: ERROR
  languages: [dockerfile]
  pattern-regex: '^\s*FROM\s+[^\s:]+:latest\b'

- id: docker-user-root
  message: 'Container chạy với USER root. Chạy non-root.'
  severity: WARNING
  languages: [dockerfile]
  pattern-regex: '^\s*USER\s+root\b'

- id: docker-add-instead-of-copy
  message: 'Dùng ADD thay vì COPY. COPY an toàn & rõ ràng hơn.'
  severity: WARNING
  languages: [dockerfile]
  pattern-regex: '^\s*ADD\s+'
