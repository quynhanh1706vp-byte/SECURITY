# Semgrep Pro-grade Custom Pack (compact v3)
rules:

- id: csharp-missing-authorizemon-modifying-actions
  message: >
    Controller action that modifies state (POST/PUT_PATCH/DELETE) is missing [Authorize] (or equivalent).
    Enforce deny-by-default and require explicit authorization on write operations.
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: |
            [$RET]
            public class $CTRL : $BASE {
              ...
              [HttpPost(...)] public $T $M(...){ ... }
            }
        - pattern: |
            [$RET]
            public class $CTRL : $BASE {
              ...
              [HttpPut(...)] public $T $M(...){ ... }
            }
        - pattern: |
            [$RET
            public class $CTRL /: $BASE {
              ...
              [HttpPatch(...)] public $T $M(...){ ... }
            }
        - pattern: |
            [$RET]
            public class $CTRL : $BASE {
              ...
              [HttpDelete(...)] public $T $M(...){ ... }
            }
    - pattern-not-inside: |
      [Authorize(...)] public class $CTRL /: $BASE { ... }
    - pattern-not: |
      [Authorize(...)] public $T $M(...){ ... }
  metadata: {category: broken-access-control, impact: high}

- id: csharp-path-traversal-io-sinks
  message: >
    Possible path traversal into file I/O sink. Normalize with Path.GetFullPath and enforce baseDir prefix or use Path.GetFileName.
  severity: ERROR
  languages: [csharp]
  patterns:
    - pattern-either:
        - pattern: File.$F(...)
        - pattern: Directory.$F(...)
        - pattern: new FileStream(...)
        - pattern: PhysicalFile(...)
        - pattern: FileResult(...)
    - metavariable-pattern:
      metavariable: $F
      pattern: (Open|OpenRead|OpenWrite|ReadAll.*|WriteAll.*e|Create|Delete|Move|Copy|Exists)
    - pattern-not: |
      Path.Combine(...)
  metadata: {category: path-traversal, impact: high }

- id: generic-secrets-high
  message: 'Hardcoded secret (API key / token / private key / password). Remove & rotate.'
  severity: CRITI-CAL
  languages: [generic]
  patterns:
    - pattern-regex: (?i)(aws_.{0,20}secret|access[_-]?key|api[_-]?key|apikey|token|private[_]?key|jwt[_-]?secret|password)s [:=]\s ["][A-zA-z0-9/\\__=:"-]{12,}["']
  metadata: {category: secrets, impact: critical}

