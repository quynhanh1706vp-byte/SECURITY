rules:
- id: csharp.dotnet.security.missing-authorize-on-write
  languages: [csharp]
  severity: HIGH
  message: "Action ghi dữ liệu thiếu [Authorize] (deny-by-default)."
  patterns:
    - pattern-either:
        - pattern: |
            [HttpPost] public $RET $A(...){ ... }
        - pattern: |
            [HttpPut] public $RET $A(...){ ... }
        - pattern: |
            [HttpPatch] public $RET $A(...){ ... }
        - pattern: |
            [HttpDelete] public $RET $A(...){ ... }
    - pattern-not: |
        [Authorize(...)] public $RET $A(...){ ... }
  metadata:
    owasp: ["A01: Broken Access Control"]
    fix: "Đặt [Authorize] cấp controller/action. [AllowAnonymous] chỉ cho login/health; áp policy/role cho write."
