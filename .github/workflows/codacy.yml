name: Codacy Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: read

jobs:
  codacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanity
        run: |
          echo "Repo checked out at $GITHUB_SHA"
          ls -la | head -n 50

      - name: Codacy CLI (local only)
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          directory: .
          upload: false
