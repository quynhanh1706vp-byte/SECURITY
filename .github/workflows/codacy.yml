name: Codacy Security Scan

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codacy:
    runs-on: ubuntu-latest
    steps:
      - name: Sanity check (no external action)
        run: |
          echo "Runner OK on ${{ github.ref }}"
          git --version
          uname -a

      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Codacy Security Scan (upload if token)
        if: ${{ secrets.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          directory: .
          upload: true
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Codacy Security Scan (local only)
        if: ${{ secrets.CODACY_PROJECT_TOKEN == '' }}
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          directory: .
          upload: false
