rules:
  - id: secret-high-entropy
    languages: [javascript, typescript, python, csharp, yaml, json, go]
    severity: CRITICAL
    message: "Chuỗi entropy cao — có thể là secret. Kiểm tra & rotate nếu là thật."
    pattern-regex: '"?[A-Za-z0-9_\\/\\-\\+=]{20,}"?'

  - id: aws-access-key
    languages: [javascript, typescript, python, csharp, yaml, json, go]
    severity: CRITICAL
    message: "Phát hiện AWS Access Key ID."
    pattern-regex: "\\bAKIA[0-9A-Z]{16}\\b"

  - id: private-key-block
    languages: [javascript, typescript, python, csharp, yaml, json, go]
    severity: CRITICAL
    message: "Private key trong repo. Di chuyển sang secret manager và rotate."
    # Dò BEGIN/END PRIVATE KEY (đa dạng RSA/EC/PKCS8). (?s) = dotall
    pattern-regex: "(?s)-----BEGIN (?:RSA |EC |)?PRIVATE KEY-----.*?-----END (?:RSA |EC |)?PRIVATE KEY-----"
